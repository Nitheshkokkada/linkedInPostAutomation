server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: linkedin-ai-agent

  # Database — Supabase PostgreSQL
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000

  # JPA — validate only, Flyway manages schema
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Quartz — JDBC JobStore backed by PostgreSQL
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz:
        scheduler:
          instanceName: LinkedInAgentScheduler
          instanceId: AUTO
        jobStore:
          class: org.quartz.impl.jdbcjobstore.JobStoreTX
          driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
          tablePrefix: QRTZ_
          isClustered: false
          misfireThreshold: 60000
        threadPool:
          class: org.quartz.simpl.SimpleThreadPool
          threadCount: 5
          threadPriority: 5

  # Mail — Gmail SMTP
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  # Spring AI — Gemini 2.0 Flash
  ai:
    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_MODEL:gemini-2.0-flash}
        embedding:
          options:
            model: text-embedding-004

# Application config
app:
  env: ${APP_ENV:development}
  secret-key: ${APP_SECRET_KEY:change-me-in-production-min-32-chars}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  backend-url: ${BACKEND_URL:http://localhost:8080}

  # JWT
  jwt:
    access-token-expiration: 900000       # 15 minutes in ms
    refresh-token-expiration: 604800000   # 7 days in ms

  # Supabase
  supabase:
    url: ${SUPABASE_URL}
    service-key: ${SUPABASE_SERVICE_KEY}
    storage-bucket: ${SUPABASE_STORAGE_BUCKET:linkedin-ai-images}

  # Gemini
  gemini:
    api-key: ${GOOGLE_AI_API_KEY}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
    rpm-limit: ${GEMINI_RPM_LIMIT:12}
    daily-limit: ${GEMINI_DAILY_LIMIT:1400}

  # LinkedIn OAuth
  linkedin:
    client-id: ${LINKEDIN_CLIENT_ID:}
    client-secret: ${LINKEDIN_CLIENT_SECRET:}
    redirect-uri: ${LINKEDIN_REDIRECT_URI:http://localhost:8080/api/v1/auth/linkedin/callback}

  # Tavily
  tavily:
    api-key: ${TAVILY_API_KEY:}

  # Encryption
  encryption:
    aes-key: ${AES_SECRET_KEY:default-32-char-key-change-me!!}

# Resilience4j
resilience4j:
  ratelimiter:
    instances:
      gemini:
        limitForPeriod: ${GEMINI_RPM_LIMIT:12}
        limitRefreshPeriod: 60s
        timeoutDuration: 5s
  retry:
    instances:
      gemini:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      linkedin:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      supabase:
        maxAttempts: 3
        waitDuration: 1s
  circuitbreaker:
    instances:
      gemini:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 10
      linkedin:
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        slidingWindowSize: 10

# Logging
logging:
  level:
    com.linkedinagent: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
