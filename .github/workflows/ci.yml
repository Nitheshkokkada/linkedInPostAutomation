name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: apps/api
        run: mvn clean compile -B

      - name: Run tests
        working-directory: apps/api
        env:
          SUPABASE_DB_URL: jdbc:postgresql://localhost:5432/postgres
          SUPABASE_DB_USER: postgres
          SUPABASE_DB_PASSWORD: postgres
        run: mvn test -B

      - name: Package
        working-directory: apps/api
        run: mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-jar
          path: apps/api/target/*.jar
          retention-days: 7

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    if: ${{ hashFiles('apps/web/package.json') != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type check
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t linkedin-agent-api ./apps/api

      - name: Test Docker image
        run: |
          docker run -d --name test-api -p 8080:8080 \
            -e SUPABASE_DB_URL=jdbc:postgresql://host.docker.internal:5432/postgres \
            -e SUPABASE_DB_USER=postgres \
            -e SUPABASE_DB_PASSWORD=postgres \
            linkedin-agent-api || true
          sleep 5
          docker logs test-api || true
